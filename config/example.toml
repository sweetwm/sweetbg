# Manju configuration
# Place this file at $XDG_CONFIG_HOME/manju/config.toml
# (or ~/.config/manju/config.toml). All keys are optional.

# Wallpaper shown at startup. Must be an absolute path to a JPEG, PNG, or WebP.
image = "/home/me/Pictures/wallpaper.jpg"

# Background color, as "#rrggbb". Shown before an image is set, and behind the
# image in the "contain" and "center" fit modes.
color = "#1e1e2e"

# Image fit mode: "cover", "contain", "center", or "tile".
#   cover   - fill the output, cropping overflow from the center
#   contain - fit inside the output, letterboxed with the background color
#   center  - native size, centered (cropped if larger, padded if smaller)
#   tile    - repeat at native size across the output
fit = "cover"

# Per-output sections override defaults for a single output.
# The name is what `manju query` reports (e.g. DP-1, HDMI-A-1).
# [output.DP-1]
# image = "/home/me/Pictures/left.jpg"
# fit = "contain"
#
# [output.HDMI-A-1]
# image = "/home/me/Pictures/tv.png"
#
# Use an empty image to show only the background color on one output,
# even when a top-level default image exists.
# [output.eDP-1]
# image = ""
